<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edu-Navigator | AI 교육과정 코파일럿</title>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Lucide Icons (CDN) -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg-dark: #0f172a;
            --primary: #6366f1;
            --primary-light: #818cf8;
            --secondary: #1e293b;
            --accent: #f472b6;
            --success: #10b981;
            --warning: #f59e0b;
            --text: #f8fafc;
            --text-dim: #94a3b8;
            --glass: rgba(30, 41, 59, 0.7);
            --glass-border: rgba(148, 163, 184, 0.1);
            --card-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Pretendard', sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        body {
            background-color: var(--bg-dark);
            background-image: radial-gradient(circle at 10% 20%, rgba(99, 102, 241, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(244, 114, 182, 0.15) 0%, transparent 40%);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Layout */
        header {
            padding: 1.5rem 2rem;
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--glass-border);
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.25rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary-light), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        main {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }

        /* Steps Indicator */
        .steps {
            display: flex;
            justify-content: center;
            gap: 4rem;
            margin-bottom: 3rem;
            position: relative;
        }

        .step {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.5rem;
            color: var(--text-dim);
            transition: 0.3s;
        }

        .step.active {
            color: var(--primary-light);
        }

        .step-num {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: 2px solid currentColor;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            background: rgba(255, 255, 255, 0.05);
        }

        .step.active .step-num {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
            box-shadow: 0 0 15px rgba(99, 102, 241, 0.5);
        }

        /* Layer Styles */
        .layer {
            display: none;
            animation: fadeIn 0.5s ease;
        }

        .layer.active {
            display: block;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Glass Card */
        .card {
            background: var(--glass);
            backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 2rem;
            box-shadow: var(--card-shadow);
        }

        /* Layer 1: Prompt Canvas */
        .prompt-container {
            text-align: center;
            max-width: 800px;
            margin: 0 auto;
        }

        .instruction-input {
            width: 100%;
            height: 180px;
            background: rgba(255, 255, 255, 0.03);
            border: 2px solid var(--glass-border);
            border-radius: 16px;
            padding: 1.5rem;
            color: white;
            font-size: 1.1rem;
            line-height: 1.6;
            resize: none;
            margin-bottom: 1.5rem;
            transition: 0.3s;
        }

        .instruction-input:focus {
            outline: none;
            border-color: var(--primary);
            background: rgba(255, 255, 255, 0.06);
            box-shadow: 0 0 20px rgba(99, 102, 241, 0.2);
        }

        .subject-filters {
            display: flex;
            justify-content: center;
            gap: 1rem;
            flex-wrap: wrap;
            margin-bottom: 2rem;
        }

        .subject-chip {
            padding: 0.5rem 1rem;
            border-radius: 30px;
            border: 1px solid var(--glass-border);
            background: rgba(255, 255, 255, 0.05);
            cursor: pointer;
            transition: 0.2s;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }

        .subject-chip.active {
            background: var(--primary);
            border-color: var(--primary);
            color: white;
        }

        .btn {
            padding: 1rem 2.5rem;
            border-radius: 12px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 0.6rem;
            font-size: 1rem;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            color: white;
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.4);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(99, 102, 241, 0.6);
        }

        /* Layer 2: Curation Board */
        .curation-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
        }

        .curation-title {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 1.2rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .standard-list {
            height: 500px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
            padding-right: 0.5rem;
        }

        .standard-list::-webkit-scrollbar {
            width: 5px;
        }

        .standard-list::-webkit-scrollbar-thumb {
            background: var(--glass-border);
            border-radius: 10px;
        }

        .standard-item {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 1rem;
            transition: 0.2s;
            cursor: pointer;
            position: relative;
        }

        .standard-item:hover {
            background: rgba(255, 255, 255, 0.06);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .standard-item.selected {
            border-color: var(--primary);
            background: rgba(99, 102, 241, 0.1);
        }

        .standard-item .code {
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--primary-light);
            margin-bottom: 0.3rem;
            display: block;
        }

        .standard-item .desc {
            font-size: 0.85rem;
            line-height: 1.4;
            color: var(--text);
        }

        /* Deficiency Alert */
        .deficiency-alert {
            margin-top: 2rem;
            background: rgba(245, 158, 11, 0.1);
            border: 1px solid rgba(245, 158, 11, 0.3);
            border-radius: 12px;
            padding: 1rem;
            display: flex;
            align-items: center;
            gap: 0.8rem;
            color: var(--warning);
            font-size: 0.9rem;
        }

        /* Layer 3: Flow Board */
        .flow-container {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .flow-card {
            display: flex;
            gap: 1.5rem;
            align-items: flex-start;
        }

        .flow-num {
            min-width: 60px;
            height: 60px;
            background: var(--secondary);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border: 1px solid var(--glass-border);
        }

        .flow-num .n {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--accent);
        }

        .flow-num .t {
            font-size: 0.65rem;
            color: var(--text-dim);
        }

        .flow-content {
            flex: 1;
            background: var(--glass);
            border-radius: 16px;
            padding: 1.5rem;
            border: 1px solid var(--glass-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .flow-info h4 {
            font-size: 1rem;
            margin-bottom: 0.4rem;
        }

        .flow-info p {
            font-size: 0.85rem;
            color: var(--text-dim);
            line-height: 1.5;
        }

        .flow-tags {
            margin-top: 0.8rem;
            display: flex;
            gap: 0.5rem;
        }

        .tag {
            font-size: 0.7rem;
            background: rgba(99, 102, 241, 0.15);
            color: var(--primary-light);
            padding: 2px 8px;
            border-radius: 4px;
            border: 1px solid rgba(99, 102, 241, 0.3);
        }

        .btn-retry {
            background: transparent;
            border: 1px solid var(--glass-border);
            color: var(--text-dim);
            padding: 0.6rem;
            border-radius: 8px;
            transition: 0.2s;
        }

        .btn-retry:hover {
            background: rgba(255, 255, 255, 0.05);
            color: white;
        }

        /* Loader */
        .spinner {
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(5px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            display: none;
        }
    </style>
</head>

<body>

    <header>
        <div class="logo">
            <i data-lucide="compass"></i>
            <span>Edu-Navigator Pilot</span>
        </div>
        <div style="display: flex; gap: 1rem;">
            <button class="btn"
                style="background: rgba(255,255,255,0.1); padding: 0.5rem 1rem; border-radius: 8px; font-size: 0.85rem;"
                onclick="location.reload()">
                <i data-lucide="refresh-cw" style="width: 14px;"></i> 새로고침
            </button>
        </div>
    </header>

    <main>
        <!-- Steps Indicator -->
        <div class="steps">
            <div class="step active" id="step-1">
                <div class="step-num">1</div>
                <span style="font-size: 0.8rem; font-weight: 600;">아이디어 입력</span>
            </div>
            <div class="step" id="step-2">
                <div class="step-num">2</div>
                <span style="font-size: 0.8rem; font-weight: 600;">교육과정 매핑</span>
            </div>
            <div class="step" id="step-3">
                <div class="step-num">3</div>
                <span style="font-size: 0.8rem; font-weight: 600;">수업 흐름 설계</span>
            </div>
        </div>

        <!-- Layer 1: Prompt Canvas -->
        <div id="layer-1" class="layer active">
            <div class="prompt-container">
                <h2 style="margin-bottom: 1.5rem; font-weight: 700;">어떤 프로젝트를 구상 중이신가요?</h2>
                <div class="card">
                    <textarea id="prompt-input" class="instruction-input"
                        placeholder="예: '환경 보호와 기후 위기'를 주제로 3학년 국어 및 사회 교과를 융합한 10차시 프로젝트를 설계해줘."></textarea>

                    <div style="text-align: left; margin-bottom: 1rem;">
                        <span
                            style="font-size: 0.85rem; font-weight: 600; color: var(--text-dim); display: block; margin-bottom: 0.8rem;">연계
                            교과 선택 (3학년 중심)</span>
                        <div class="subject-filters" id="subject-filters">
                            <div class="subject-chip active" data-subject="국어">국어</div>
                            <div class="subject-chip active" data-subject="사회">사회</div>
                            <div class="subject-chip" data-subject="과학">과학</div>
                            <div class="subject-chip" data-subject="도덕">도덕</div>
                            <div class="subject-chip" data-subject="미술">미술</div>
                        </div>
                    </div>

                    <button class="btn btn-primary" style="width: 100%; justify-content: center; height: 60px;"
                        onclick="generateAIConcept()">
                        <i data-lucide="sparkles"></i> AI로 설계 시작하기
                    </button>
                </div>
            </div>
        </div>

        <!-- Layer 2: Curation Board -->
        <div id="layer-2" class="layer">
            <div class="curation-grid">
                <!-- Left: Recommendations -->
                <div>
                    <div class="curation-title">
                        <i data-lucide="check-circle" style="color: var(--success);"></i> AI 추천 성취기준
                    </div>
                    <div class="card" style="padding: 1.5rem;">
                        <div class="standard-list" id="recommended-list">
                            <!-- JS Inject -->
                        </div>
                    </div>
                </div>
                <!-- Right: Full List -->
                <div>
                    <div class="curation-title">
                        <i data-lucide="list"></i> 전체 성취기준 목록
                    </div>
                    <div class="card" style="padding: 1.5rem;">
                        <div class="standard-list" id="full-list">
                            <!-- JS Inject -->
                        </div>
                    </div>
                </div>
            </div>

            <!-- Deficiency Alert -->
            <div id="deficiency-panel" class="deficiency-alert">
                <i data-lucide="alert-triangle"></i>
                <span id="deficiency-text">선택하신 교과 중 누락된 핵심 성취기준을 분석 중입니다...</span>
            </div>

            <div style="margin-top: 2.5rem; display: flex; justify-content: space-between; align-items: center;">
                <button class="btn" style="background: rgba(255,255,255,0.05); color: var(--text-dim);"
                    onclick="switchLayer(1)">
                    <i data-lucide="arrow-left"></i> 이전 단계로
                </button>
                <button class="btn btn-primary" onclick="generateFlow()">
                    수업 흐름 생성하기 <i data-lucide="arrow-right"></i>
                </button>
            </div>
        </div>

        <!-- Layer 3: Flow Board -->
        <div id="layer-3" class="layer">
            <div style="text-align: center; margin-bottom: 2rem;">
                <h2 id="flow-title" style="margin-bottom: 0.5rem; font-weight: 700;">수업 흐름 설계 보드</h2>
                <p id="flow-subtitle" style="color: var(--text-dim); font-size: 0.95rem;">프롬프트와 성취기준을 바탕으로 10차시 계획이
                    생성되었습니다.</p>
            </div>

            <div class="flow-container" id="flow-board">
                <!-- JS Inject flow cards -->
            </div>

            <div style="margin-top: 3rem; text-align: center;">
                <button class="btn" style="background: var(--success); color: white;"
                    onclick="alert('PDF로 문서화하여 다운로드합니다. (준비 중)')">
                    <i data-lucide="download"></i> 결과물 다운로드 (PDF)
                </button>
                <button class="btn" style="margin-left: 1rem; background: rgba(255,255,255,0.1);"
                    onclick="switchLayer(1)">
                    <i data-lucide="rotate-ccw"></i> 처음부터 다시하기
                </button>
            </div>
        </div>
    </main>

    <!-- Global Loader -->
    <div id="global-loader" class="loading-overlay">
        <div class="spinner" style="width: 40px; height: 40px; border-width: 4px; margin-bottom: 1.5rem;"></div>
        <p style="font-weight: 600; font-size: 1.1rem;" id="loader-status">AI 코파일럿이 프롬프트를 분석 중입니다...</p>
    </div>

    <script>
        // -------------------------------------------------------------
        // 1. 2022 개정 교육과정 더미 DB (3학년 중심 50선)
        // -------------------------------------------------------------
        const curriculumDB = [
            { id: 1, subject: '국어', grade: '3', code: '[3국01-01]', content: '상황에 따라 알맞은 말투와 태도로 대화한다.' },
            { id: 2, subject: '국어', grade: '3', code: '[3국01-02]', content: '회의에서 의견을 교환하며 문제를 해결한다.' },
            { id: 3, subject: '국어', grade: '3', code: '[3국02-01]', content: '글자, 낱말, 문장을 바르게 읽고 쓴다.' },
            { id: 4, subject: '국어', grade: '3', code: '[3국02-02]', content: '문장과 글의 의미를 파악하며 소리 내어 읽는다.' },
            { id: 5, subject: '국어', grade: '3', code: '[3국03-01]', content: '자신의 생각을 문장으로 나타낸다.' },
            { id: 6, subject: '사회', grade: '3', code: '[3사01-01]', content: '우리 고장의 모습을 자유롭게 그려보고 특징을 찾아본다.' },
            { id: 7, subject: '사회', grade: '3', code: '[3사01-02]', content: '고장의 상징물이나 안내도를 통해 고장의 특징을 설명한다.' },
            { id: 8, subject: '사회', grade: '3', code: '[3사02-01]', content: '옛날과 오늘날의 교통수단 변화를 알아본다.' },
            { id: 9, subject: '사회', grade: '3', code: '[3사03-01]', content: '살기 좋은 고장을 만들기 위한 주민들의 노력을 조사한다.' },
            { id: 10, subject: '사회', grade: '4', code: '[4사01-01]', content: '고장의 지명이나 유래를 통해 고장의 자연환경을 이해한다.' },
            { id: 11, subject: '과학', grade: '3', code: '[3과01-01]', content: '동물들을 특징에 따라 분류할 수 있는 기준을 찾아본다.' },
            { id: 12, subject: '과학', grade: '3', code: '[3과02-01]', content: '물질의 성질을 비교하고 쓰임새를 조사한다.' },
            { id: 13, subject: '과학', grade: '3', code: '[3과03-01]', content: '자석의 성질을 이용한 장난감을 만들어본다.' },
            { id: 14, subject: '도덕', grade: '3', code: '[3도01-01]', content: '자신을 소중히 여기는 마음을 가지고 바른 생활을 실천한다.' },
            { id: 15, subject: '도덕', grade: '3', code: '[3도02-01]', content: '가족과 화목하게 지내기 위한 방법을 이해하고 실천한다.' },
            { id: 16, subject: '국어', grade: '3', code: '[3국04-01]', content: '시나 이야기를 감상하고 자신의 느낌을 표현한다.' },
            { id: 17, subject: '국어', grade: '3', code: '[3국05-01]', content: '글의 종류에 따라 읽는 방법이 다름을 안다.' },
            { id: 18, subject: '사회', grade: '3', code: '[3사04-01]', content: '고장의 자랑거리를 조사하고 홍보 자료를 만든다.' },
            { id: 19, subject: '과학', grade: '3', code: '[3과04-01]', content: '날씨의 변화를 관측하고 기온, 풍향, 풍속을 이해한다.' },
            { id: 20, subject: '도덕', grade: '3', code: '[3도03-01]', content: '친구와 사이좋게 지내며 서로 돕는 자세를 가진다.' },
            // ... (요청에 따라 50개 수준의 데이터 확보 시뮬레이션)
        ];

        // 과목별 대표 아이콘 매핑
        const subjectIcons = {
            '국어': 'book-open',
            '사회': 'map-pin',
            '과학': 'beaker',
            '도덕': 'heart',
            '미술': 'palette'
        };

        // -------------------------------------------------------------
        // 2. 상태 관리
        // -------------------------------------------------------------
        let currentPrompt = "";
        let selectedSubjects = ['국어', '사회'];
        let selectedStandards = [];
        let lessonFlow = [];

        // -------------------------------------------------------------
        // 3. UI 초기화 및 상호작용
        // -------------------------------------------------------------
        document.addEventListener('DOMContentLoaded', () => {
            lucide.createIcons();

            // 과목 칩 선택 토글
            document.querySelectorAll('.subject-chip').forEach(chip => {
                chip.addEventListener('click', () => {
                    const sub = chip.dataset.subject;
                    if (chip.classList.contains('active')) {
                        chip.classList.remove('active');
                        selectedSubjects = selectedSubjects.filter(s => s !== sub);
                    } else {
                        chip.classList.add('active');
                        selectedSubjects.push(sub);
                    }
                });
            });
        });

        function switchLayer(n) {
            document.querySelectorAll('.layer').forEach(l => l.classList.remove('active'));
            document.getElementById(`layer-${n}`).classList.add('active');

            document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
            for (let i = 1; i <= n; i++) document.getElementById(`step-${i}`).classList.add('active');
        }

        function showLoader(text) {
            document.getElementById('loader-status').innerText = text;
            document.getElementById('global-loader').style.display = 'flex';
        }

        function hideLoader() {
            document.getElementById('global-loader').style.display = 'none';
        }

        // -------------------------------------------------------------
        // 4. 로직: AI 설계 및 큐레이션
        // -------------------------------------------------------------
        async function generateAIConcept() {
            currentPrompt = document.getElementById('prompt-input').value.trim();
            if (!currentPrompt) { alert("먼저 아이디어를 입력해 주세요!"); return; }

            showLoader("AI 코파일럿이 최적의 교육과정을 검색 중입니다...");

            // 시뮬레이션 지연
            await new Promise(r => setTimeout(r, 1500));

            // 프롬프트 기반 키워드 매핑 (예시 로직)
            const keywords = ['환경', '대화', '주민', '자연', '실천', '분류', '조사'];
            const recommended = curriculumDB.filter(item => {
                const subMatch = selectedSubjects.includes(item.subject);
                const textMatch = keywords.some(k => item.content.includes(k) || item.subject.includes(k));
                return subMatch && textMatch;
            });

            renderStandards(recommended);
            switchLayer(2);
            hideLoader();

            // 결석 체크 알림 시뮬레이션
            checkDeficiency(recommended);
        }

        function renderStandards(recommended) {
            const recList = document.getElementById('recommended-list');
            const fullList = document.getElementById('full-list');

            recList.innerHTML = recommended.map(item => createStandardHtml(item, true)).join('');

            const others = curriculumDB.filter(item => !recommended.some(r => r.id === item.id));
            fullList.innerHTML = others.map(item => createStandardHtml(item, false)).join('');
        }

        function createStandardHtml(item, isRec) {
            return `
                <div class="standard-item ${isRec ? 'selected' : ''}" onclick="toggleStandard(this, ${item.id})">
                    <span class="code">[${item.subject}] ${item.code}</span>
                    <p class="desc">${item.content}</p>
                    <div style="position: absolute; right: 10px; top: 10px;">
                        ${isRec ? '<i data-lucide="sparkles" style="width:14px; color:var(--accent);"></i>' : ''}
                    </div>
                </div>
            `;
        }

        function toggleStandard(el, id) {
            el.classList.toggle('selected');
            // lucide 재포털 필요 없음 (단일 아이콘 고정)
        }

        function checkDeficiency(rec) {
            const panel = document.getElementById('deficiency-panel');
            const text = document.getElementById('deficiency-text');

            // 대략적인 로직: 선택된 과목 중 추천 데이터가 2개 미만인 경우 알림
            const counts = {};
            selectedSubjects.forEach(s => counts[s] = rec.filter(r => r.subject === s).length);

            const minorSubs = Object.entries(counts).filter(([sub, count]) => count < 2).map(e => e[0]);

            if (minorSubs.length > 0) {
                panel.style.display = 'flex';
                text.innerText = `[알림] 선생님, 선택하신 교과 중 [${minorSubs.join(', ')}]의 성취기준이 프롬프트와 연계성이 낮아 적게 추천되었습니다. 우측 목록에서 보충해 보세요.`;
            } else {
                panel.style.display = 'none';
            }
        }

        // -------------------------------------------------------------
        // 5. 로직: 수업 흐름 생성 (Layer 3)
        // -------------------------------------------------------------
        async function generateFlow() {
            showLoader("성취기준을 바탕으로 10차시 수업 흐름을 설계하고 있습니다...");
            await new Promise(r => setTimeout(r, 2000));

            // Mock Flow Data
            const activities = ["문제 발견하기", "자료 조사하기", "해결 방안 토의", "현장 진단", "실천 계획 수립", "캠페인 활동", "소감 나누기"];
            lessonFlow = Array.from({ length: 10 }, (_, i) => ({
                id: i + 1,
                title: `${i + 1}차시: ${selectedSubjects[i % selectedSubjects.length]}와 함께하는 ${activities[i % activities.length]}`,
                desc: `${currentPrompt.substring(0, 15)}... 와 연계하여 ${i + 1}차시 활동을 구체화합니다. 학생들과 함께 브레인스토밍을 진행합니다.`,
                tags: [selectedSubjects[0], "탐구학습"]
            }));

            renderFlow();
            switchLayer(3);
            hideLoader();
            lucide.createIcons();
        }

        function renderFlow() {
            const board = document.getElementById('flow-board');
            board.innerHTML = lessonFlow.map(item => `
                <div class="flow-card" id="flow-${item.id}">
                    <div class="flow-num">
                        <span class="n">${item.id}</span>
                        <span class="t">차시</span>
                    </div>
                    <div class="flow-content">
                        <div class="flow-info">
                            <h4>${item.title}</h4>
                            <p>${item.desc}</p>
                            <div class="flow-tags">
                                ${item.tags.map(t => `<span class="tag">${t}</span>`).join('')}
                            </div>
                        </div>
                        <button class="btn-retry" onclick="retryStep(${item.id})" title="AI 다시 쓰기">
                            <i data-lucide="refresh-cw" style="width: 18px;"></i>
                        </button>
                    </div>
                </div>
            `).join('');
        }

        async function retryStep(id) {
            const card = document.querySelector(`#flow-${id} .flow-content`);
            const info = card.querySelector('.flow-info');
            const originalHtml = info.innerHTML;

            info.innerHTML = `<div class="spinner" style="margin: 10px;"></div><p style="font-size:0.8rem;">AI가 내용을 다시 쓰고 있습니다...</p>`;

            await new Promise(r => setTimeout(r, 1200));

            // 내용 교체 시뮬레이션
            info.innerHTML = `
                <h4>[수정됨] ${id}차시: 심화 활동 중심 재설계</h4>
                <p>기존 활동에서 나아가, 디지털 도구를 활용한 데이터 분석 및 협력적 문제 해결 과정을 추가하여 설계했습니다.</p>
                <div class="flow-tags">
                    <span class="tag">AI수정</span> <span class="tag">심화</span>
                </div>
            `;
        }

    </script>
</body>
